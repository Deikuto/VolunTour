<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolunTour | Алтернативен Туризъм</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="top-nav">
        <div class="logo">VolunTour</div>
        
        <div class="search-controls">
            <select id="location-select" onchange="goToLocation()">
                <option value="none">Избери локация...</option>
                <option value="nessebar">Несебър</option>
                <option value="burgas">Бургас</option>
                <option value="sofia">София</option>
            </select>

            <select id="category-filter" onchange="filterMissions()">
                <option value="all">Всички категории</option>
                <option value="Екология">Екология</option>
                <option value="Инфраструктура">Инфраструктура</option>
                <option value="Култура">Култура</option>
            </select>
        </div>

        <div id="auth-section">
            <button id="login-btn" class="nav-btn" onclick="openLoginModal()">Вход в системата</button>
            <div id="user-profile" class="hidden">
                <span class="user-greeting">Профил: Деян (Гид)</span>
                <button class="nav-btn action" onclick="startCreatingMission()">Публикувай обява</button>
                <button class="nav-btn" onclick="logout()">Изход</button>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Вход в системата</h2>
            <p>За целите на демонстрацията, влезте със симулиран профил.</p>
            <button class="full-btn" onclick="simulateLogin()">Вход като Деян (Гид)</button>
            <button class="full-btn secondary" onclick="closeLoginModal()">Отказ</button>
        </div>
    </div>

    <div id="create-panel" class="side-panel hidden">
        <h2>Нова доброволческа обява</h2>
        <p class="instruction">Кликнете върху картата, за да зададете точна локация.</p>
        
        <label>Заглавие</label>
        <input type="text" id="m-title" placeholder="Кратко и ясно заглавие">
        
        <label>Описание и цел</label>
        <textarea id="m-desc" placeholder="Какво точно ще се прави?"></textarea>
        
        <label>Категория</label>
        <select id="m-category">
            <option value="Екология">Екология</option>
            <option value="Инфраструктура">Инфраструктура</option>
            <option value="Култура">Култура</option>
        </select>

        <label>Тагове (изберете приложимите)</label>
        <div class="tag-selector" id="m-tags-container">
            <label class="tag-checkbox"><input type="checkbox" value="Почистване"> Почистване</label>
            <label class="tag-checkbox"><input type="checkbox" value="Физически труд"> Физически труд</label>
            <label class="tag-checkbox"><input type="checkbox" value="Природа"> Природа</label>
            <label class="tag-checkbox"><input type="checkbox" value="Градска среда"> Градска среда</label>
            <label class="tag-checkbox"><input type="checkbox" value="История"> История</label>
            <label class="tag-checkbox"><input type="checkbox" value="Одит"> Одит</label>
        </div>

        <div class="split-inputs">
            <div>
                <label>Дата и час</label>
                <input type="text" id="m-time" placeholder="напр. 15.06, 10:00 ч.">
            </div>
            <div>
                <label>Обхват</label>
                <input type="text" id="m-scope" placeholder="напр. 3 часа">
            </div>
        </div>

        <label>Максимален брой участници</label>
        <input type="number" id="m-spots" placeholder="напр. 15">

        <p class="coords-display">Избрани координати: <span id="mission-coords">Липсват</span></p>

        <button class="full-btn action" onclick="submitMission()">Публикувай</button>
        <button class="full-btn secondary" onclick="cancelCreatingMission()">Отказ</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
